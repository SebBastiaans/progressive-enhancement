<!doctype html>
<html lang="nl">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width">
		<title>Switch control / Progressive Enhancement / FDND</title>
		<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
		<link href="assets/styles.css" rel="stylesheet">
		<style>
			/* Schrijf hier gewoon je CSS voor dit component */

			/* Hint: Dit component kun je volledig met HTML en CSS bouwen */

			/* Hint: Hoe ver ga je qua styling? Vraag jezelf dit altijd af */
			input[switch]::thumb { /*https://webkit.org/blog/15054/an-html-switch-control/*/
				width: 300px;
				height: 200px;
			}
			input[switch] {
				accent-color: var(--green);
			}

			@supports not selector(::thumb) {
				form{
					input{
						appearance: none;
						width: 10rem;
						height: 4rem;
						background-color: grey;
						border-radius: 10rem;
						cursor: pointer;
						position: relative;
						display: flex;
						align-items: center;
						padding-inline: .5em;

						&::before{
							content: '';
							background-color: white;
							width: 4em;
							height: 4em;
							position: absolute;
							border-radius: 50%;

							@media (prefers-reduced-motion: no-preference){
								transform: translateX(0);
								transition-duration: .3s;
								transition-timing-function: ease;
							}
						}
					}

					input:checked{
						background-color: #1D9E75;

						&::before{
							@media (prefers-reduced-motion: no-preference){
								transform: translateX(7em);
								transition-duration: .3s;
								transition-timing-function: ease;
							}
							
							content: 'aan';
							align-items: center;
							justify-content: center;
							display: flex;
							
						}
					}
				}
			}
		</style>
	</head>
	<body>
		<h1>Switch control</h1>
		
		<!-- Hint: Safari heeft hiervoor iets bedacht, maar is dat al een standaard?
		     Wat gebeurt er in browsers die dat nog niet ondersteunen? -->

		<form>
			<label>
			<input type="checkbox" name="switch" switch>
			</label>
		</form>

		<details open>
			<summary>Demo video</summary>
			<video src="assets/switch.mp4" width="119" height="67" controls muted autoplay loop>
				<a href="assets/switch.mp4">assets/switch.mp4</a>
			</video>
		</details>
	</body>
</html>
